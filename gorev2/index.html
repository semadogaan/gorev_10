<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Canlı Finans Döviz Çevirici</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.5s;
            background-color: #e5e5e5;
        }

        .app-container {
            display: flex;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            width: 750px;
            max-width: 95%;
        }

        .rates-panel {
            background: #1a2530;
            color: #dcdcdc;
            padding: 30px;
            width: 40%;
        }

        .rates-panel h3 {
            margin-top: 0;
            border-bottom: 1px solid #34495e;
            padding-bottom: 10px;
            color: white;
        }

        .rate-item {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 1.05em;
        }

        .converter-panel {
            padding: 40px;
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 0.9em;
            color: #555;
            font-weight: bold;
        }

        select,
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1a2530;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #2c3e50;
        }

        #sonuc {
            margin-top: 25px;
            font-size: 1.4em;
            font-weight: bold;
            text-align: center;
            color: #1a2530;
            padding: 15px;
            border-radius: 6px;
            background-color: #f8f9fa;
            border: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="rates-panel">
            <h3>Canlı Piyasa Kurları</h3>
            <div class="rate-item"><span>USD ($)</span><span id="txt-usd">Yükleniyor...</span></div>
            <div class="rate-item"><span>EUR (€)</span><span id="txt-eur">Yükleniyor...</span></div>
            <div class="rate-item"><span>GBP (£)</span><span id="txt-gbp">Yükleniyor...</span></div>
            <div class="rate-item"><span>CHF (₣)</span><span id="txt-chf">Yükleniyor...</span></div>
            <div class="rate-item"><span>JPY (¥)</span><span id="txt-jpy">Yükleniyor...</span></div>
        </div>
        <div class="converter-panel">
            <h2 style="margin-top:0; color: #1a2530;">Döviz İşlemleri</h2>

            <div class="input-group">
                <label>İşlem Yönü</label>
                <select id="islemYonu">
                    <option value="dovizToTl">Döviz Bozdur (Yabancı Para ➔ TL)</option>
                    <option value="tlToDoviz">Döviz Al (TL ➔ Yabancı Para)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Miktar</label>
                <input type="number" id="miktar" placeholder="0.00">
            </div>

            <div class="input-group">
                <label>Hedef / Kaynak Kur</label>
                <select id="paraBirimi">
                    <option id="opt-usd" value="1" data-sembol="$">USD (Amerikan Doları)</option>
                    <option id="opt-eur" value="1" data-sembol="€">EUR (Euro)</option>
                    <option id="opt-gbp" value="1" data-sembol="£">GBP (İngiliz Sterlini)</option>
                    <option id="opt-chf" value="1" data-sembol="₣">CHF (İsviçre Frangı)</option>
                    <option id="opt-jpy" value="1" data-sembol="¥">JPY (Japon Yeni)</option>
                </select>
            </div>

            <button onclick="hesapla()">Çevir</button>
            <div id="sonuc">İşlem bekleniyor...</div>
        </div>
    </div>

    <script>
        let kurlar = {};

        async function kurlariGetir() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                const r = data.rates;

                kurlar.USD = r.TRY;
                kurlar.EUR = r.TRY / r.EUR;
                kurlar.GBP = r.TRY / r.GBP;
                kurlar.CHF = r.TRY / r.CHF;
                kurlar.JPY = r.TRY / r.JPY;

                document.getElementById('txt-usd').innerText = kurlar.USD.toFixed(2) + " ₺";
                document.getElementById('txt-eur').innerText = kurlar.EUR.toFixed(2) + " ₺";
                document.getElementById('txt-gbp').innerText = kurlar.GBP.toFixed(2) + " ₺";
                document.getElementById('txt-chf').innerText = kurlar.CHF.toFixed(2) + " ₺";
                document.getElementById('txt-jpy').innerText = kurlar.JPY.toFixed(2) + " ₺";

                document.getElementById('opt-usd').value = kurlar.USD;
                document.getElementById('opt-eur').value = kurlar.EUR;
                document.getElementById('opt-gbp').value = kurlar.GBP;
                document.getElementById('opt-chf').value = kurlar.CHF;
                document.getElementById('opt-jpy').value = kurlar.JPY;

            } catch (e) {
                document.getElementById('sonuc').innerText = "Canlı kurlar alınamadı, internet bağlantınızı kontrol edin.";
            }
        }

        kurlariGetir();

        function hesapla() {
            const miktarInput = document.getElementById('miktar').value;
            const kurSelect = document.getElementById('paraBirimi');
            const islemYonu = document.getElementById('islemYonu').value;

            if (miktarInput === "" || miktarInput <= 0) {
                document.getElementById('sonuc').innerText = "Geçerli bir miktar giriniz.";
                return;
            }

            const miktar = parseFloat(miktarInput);
            const kur = parseFloat(kurSelect.value);
            const sembol = kurSelect.options[kurSelect.selectedIndex].getAttribute('data-sembol');

            let sonucMetni = "";
            let tlDegeri = 0;

            if (islemYonu === "dovizToTl") {
                const tlSonucu = miktar * kur;
                tlDegeri = tlSonucu;
                sonucMetni = miktar + " " + sembol + " = " + tlSonucu.toFixed(2) + " ₺";
            } else {
                const dovizSonucu = miktar / kur;
                tlDegeri = miktar;
                sonucMetni = miktar + " ₺ = " + dovizSonucu.toFixed(2) + " " + sembol;
            }

            document.getElementById('sonuc').innerText = sonucMetni;

            if (tlDegeri > 1000) {
                document.body.style.backgroundColor = "#2ecc71";
            } else {
                document.body.style.backgroundColor = "#f1c40f";
            }
        }
    </script>

</body>

</html>
